<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="styles.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style> 
        /* Independent Chat Styling */

        .chat-header {
            width: 100%;
            text-align: center;
            margin-bottom: 12px;
        }

        .chat-header h1 {
            font-size: 1.6rem;
            line-height: 1.15;
            margin: 0 0 4px 0;
            white-space: normal;
            overflow-wrap: break-word;
        }

        .chat-header p {
            font-size: 1rem;
            margin: 0;
            color: #6b7280;
        }

        body {
            background-color: #f0f2f5;
            margin: 0;
            min-height: 100vh;
            padding: 40px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

            display: flex;
            justify-content: flex-start;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .chat-frame {
            width: 100%;
            max-width: 600px;
            height: 550px;
            background: white;
            border: 1px solid #dcdfe6;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-top: 10px;
            margin: 0;
        }

        .chat-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background-color: #fafafa;
        }

        .message {
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.4;
            max-width: 80%;
            margin: 10px;
        }

        .received { background: #e9e9eb; align-self: flex-start; }
        .sent { background: #3b82f6; color: white; align-self: flex-end; }

        .input-area {
            padding: 15px;
            background: white;
            border-top: 1px solid #dcdfe6;
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 10px;
            border: 1px solid #dcdfe6;
            border-radius: 8px;
            outline: none;
        }

        .input-area button {
            padding: 10px 20px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .word:hover{
            cursor: text;
            text-decoration: underline dotted;
            text-underline-offset: 3px;
        }

        .word::selection{
            background: #48bb7897;
        }

        .received {
            position: relative;
        }

        .message.received {
            position: relative;
        }

        .message.received:not(.has-selection):hover::after {
            content: "Highlight a word/phrase to translate";
            position: absolute;
            top: -20px;
            left: 10px;
            font-size: 12px;
            color: #666;
            opacity: 0.8;
            white-space: nowrap;
        }
        #translateBtn {
            position: absolute;
            display: none;
            padding: 6px 10px;
            background: #48bb78;
            color: white;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            z-index: 1000;
        }

        .translate-popup {
            position: absolute;
            flex-direction: column;
            gap: 8px;
            min-width: 170px;
            max-width: 220px;
            padding: 12px;
            background: white;
            border: 1px solid #dcdfe6;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
            z-index: 1001;
        }

        .translate-popup:not(.hidden) {
            display: flex;
        }
        .popup-pinyin div,
        .popup-translation div {
            margin-bottom: 4px;
        }
        .popup-pinyin {
            font-size: 15px;
            font-weight: 600;
            color: #1f2937;
        }

        .popup-translation {
            font-size: 14px;
            color: #4b5563;
            border-top: 1px solid #eef2f7;
            padding-top: 6px;
        }

        .popup-save-btn {
            padding: 8px 10px;
            background: #48bb78;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .popup-save-btn:hover {
            background: #38a169;
        }

        .popup-full-translation {
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eef2f7;
        }

        .popup-full-text {
            font-size: 16px;
            font-weight: 600;
            color: #111827;
            line-height: 1.4;
        }

        .popup-word-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .popup-word-row {
            display: grid;
            grid-template-columns: auto auto 1fr;
            gap: 10px;
            align-items: start;
            font-size: 14px;
            line-height: 1.4;
        }

        .popup-word-cn {
            font-weight: 700;
            color: #16a34a;
            background: #dcfce7;
            padding: 2px 6px;
            border-radius: 6px;
        }

        .popup-word-py {
            color: #6b7280;
            font-style: italic;
        }

        .popup-word-en {
            color: #374151;
        }

        .RtnHomeBtn {
            margin-top: 20px;
            padding: 10px 20px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

    </style>
    <title>Your New Chat With ____</title>
</head>
<body>

<div class="app-container">
    <div class="chat-header">
        <h1>Say hi to <span id="selectedName"></span>!</h1>
        <p>Ask them about <span id="commonInterest"></span>!</p>
    </div>

    <div class="chat-frame">
        <div class="chat-container">
            
            <div class="message received hidden">
                <span class="word">早上好</span><span class="word">现在</span><span class="word">我</span><span class="word">有</span><span class="word">冰淇淋</span>
            </div>

            <div class="message received hidden">
                <span class="word">但是</span>,<span class="word">我</span><span class="word">最</span><span class="word">喜欢</span><span class="word">速度与激情9!</span>
            </div>

        </div>
        <div class="input-area">
            <input id="text-input" type="text" placeholder="Type a message...">
            <button id="sendTextBtn">Send</button>
        </div>
    </div>
</div>

<div id="translateBtn" class="translate-btn">Translate</div>

<div id="translatePopup" class="translate-popup hidden">
    <div id="popupFullTranslation" class="popup-full-translation"></div>
    <div id="popupWordList" class="popup-word-list"></div>
    <button id="saveWordBtn" class="popup-save-btn">Save to list</button>
</div>

<div>
    <button id="RtnHomeBtn">Return Back Home</button>
    <button id="ReviewBtn">Review Words Saved</button>
</div>
<script src="script.js"></script>
</body>
</html>
