<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="styles.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style> 
        /* Independent Chat Styling */

        .top-container h1 {
            font-size: 2rem; /* Scalable size for mobile */
            margin: 0 0 40px 0; /* Only adds a small gap below the text */
            text-align: center;
        }

        body {
            background-color: #f0f2f5;
            margin: 0;
            min-height: 100vh;
            padding: 40px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

            display: flex;
            justify-content: center;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .chat-frame {
            width: 100%;
            max-width: 600px;
            height: 600px;
            background: white;
            border: 1px solid #dcdfe6;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-top: 10px;
            margin: 0;
        }

        .chat-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background-color: #fafafa;
        }

        .message {
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.4;
            max-width: 80%;
        }

        .received { background: #e9e9eb; align-self: flex-start; }
        .sent { background: #3b82f6; color: white; align-self: flex-end; }

        .input-area {
            padding: 15px;
            background: white;
            border-top: 1px solid #dcdfe6;
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 10px;
            border: 1px solid #dcdfe6;
            border-radius: 8px;
            outline: none;
        }

        .input-area button {
            padding: 10px 20px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .word:hover{
            cursor: text;
            text-decoration: underline dotted;
            text-underline-offset: 3px;
        }

        .received {
            position: relative;
        }

        .translate-btn {
            position: absolute;
            display: none;
            pointer-events: auto;
            padding: 6px 10px;
            background: #666;
            color: rgba(255, 255, 255, 0.497);
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            z-index: 1000;
        }

    </style>
    <title>Your New Chat With ____</title>
</head>
<body>

<div class="app-container">
    <div class="top-container">
        <h1>Say hi to ____! Ask them about ____!</h1>
    </div>

    <div class="chat-frame">
        <div class="chat-container">
            
            <div class="message received hidden">
                <span class="word">早上好</span><span class="word">现在</span><span class="word">我</span><span class="word">有</span><span class="word">冰淇淋</span>
            </div>

            <div class="message received hidden">
                <span class="word">但是</span>,<span class="word">我</span><span class="word">最</span><span class="word">喜欢</span><span class="word">速度与激情9!</span>
            </div>

        </div>
        <div class="input-area">
            <input id="text-input" type="text" placeholder="Type a message...">
            <button id="sendTextBtn">Send</button>
        </div>
    </div>
</div>

<div id="translateBtn" class="translate-btn">Highlight to translate</div>
<script src="script.js"></script>
</body>
</html>
