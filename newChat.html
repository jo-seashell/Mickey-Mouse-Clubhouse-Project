<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="styles.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat With Friend Dashboard</title>
</head>
<style>
    #friendList {
    list-style: none;
    padding-left: 0;
    margin: 0;
}

    #friendList li {
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid #ddd;
    }

    .friendOption {
    display: flex;
    align-items: center;
    gap: 10px;
}

    .friend-name {
    font-size: 1.5rem;
    font-weight: bold;
}

</style>


<body>
    <div id="interests" class="app-container interests">

        <h1>Start a New Chat</h1>

        <div>
            <h1>Select Interests</h1>
        </div>

        <form action="" method="">
            <input type="checkbox" value="Sports"> Sports <br>
            <input type="checkbox" value="Music"> Music <br>
            <input type="checkbox" value="Food"> Food <br>
            <input type="checkbox" value="Travel"> Travel <br>
            <input type="checkbox" value="Movies"> Movies <br>
            <input type="checkbox" value="Technology"> Technology <br>
            <input type="checkbox" value="Art"> Art <br>
            <input type="checkbox" value="Fashion"> Fashion <br>
            <input type="checkbox" value="Fitness"> Fitness <br>
            <input type="checkbox" value="Gaming"> Gaming <br>
            <input type="checkbox" value="Books"> Books <br>
            <input type="checkbox" value="Nature"> Nature <br>
            <input type="checkbox" value="Animals"> Animals <br>
            <input type="checkbox" value="Science"> Science <br>
        </form>

        <div> 
            <button type="button" id="saveBtn">Find a Friend</button>
        </div>
       <ul id="savedList" class="hidden"></ul>

        <script>
            const saveBtn = document.getElementById('saveBtn');
            const form = document.querySelector('form');
            const savedList = document.getElementById('savedList');

        
            window.onload = () => {
                const savedItems = JSON.parse(localStorage.getItem('checkedItems')) || [];
        
                [...form.elements].forEach(cb => {
                    if (savedItems.includes(cb.value)) {
                        cb.checked = true;
                    }
                });
                displaySavedItems(savedItems);
            };

            saveBtn.addEventListener('click', () => {
                const checkedItems = [...form.elements]
                    .filter(cb => cb.checked)
                    .map(cb => cb.value);

                localStorage.setItem('checkedItems', JSON.stringify(checkedItems));
                displayFriends()
                displaySavedItems(checkedItems);
                alert('Selection saved!');
            });

            function displaySavedItems(items) {
                savedList.innerHTML = '';
                items.forEach(item => {
                    const li = document.createElement('li');
                    li.textContent = item;
                    savedList.appendChild(li);
                });
            }
        </script>
    </div> 

    <div id="findfriend" class="app-container hidden">
        <h1>Pick a new friend to chat with...</h1>
        <div id="listFriends" class="listFriends">
            <ul id="friendList"></ul>

        </div>
        


        <button id="backBtn">Back to Interests</button>

        <button id="startChatBtn">Start Chatting!</button>
    </div>

    <script src="script.js"></script>
</body>
