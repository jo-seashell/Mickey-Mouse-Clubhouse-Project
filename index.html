<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Language Dashboard</title>
    <style>
        body {
            background-color: #f0f2f5;
            margin: 0;
            padding: 40px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .feature-box {
            background-color: #ffffff;
            border: 1px solid #dcdfe6;
            border-radius: 12px;
            padding: 25px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); /* Soft shadow for depth */
            transition: all 0.2s ease;
        }

        .feature-box:hover {
            border-color: #409eff;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
        }

        .streak { border-left: 8px solid #48bb78; }
        .dashboard { border-left: 8px solid #3b82f6; }
        .convo { border-left: 8px solid #f6ad55; }
        .review { border-left: 8px solid #fc8181; }

        h2 { margin: 0 0 10px 0; font-size: 1.4rem; color: #1a1a1a; }
        p { margin: 0; color: #606266; }
        
        .status { color: #67c23a; font-weight: bold; margin-top: 8px; display: block; }

        .sub-container {
            display: none;
            flex-direction: column;
            gap: 10px;
            padding-left: 20px;
        }

        .sub-box {
            background: #fff;
            border: 1px solid #ddd;
            padding: 12px;
            border-radius: 8px;
            width: fit-content;
            font-weight: 600;
        }

        .highlight { background-color: #fff9db; border-color: #fab005; }
        .show { display: flex !important; }
    </style>
</head>
<body>

<div class="app-container">
    
    <div class="feature-box streak">
        <h2>Weekly Calendar Streak</h2>
        <p>🔥 12 Days — You're killing it!</p>
    </div>

    <div class="feature-box dashboard">
        <h2>Dashboard</h2>
        <p>Language: <strong>Mandarin Chinese</strong></p>
        <span class="status">● 5 Friends Online</span>
    </div>

    <div class="feature-box convo" onclick="toggleMenu()">
        <h2>Conversation</h2>
        <p>Click to practice speaking</p>
    </div>

    <div id="sub-menu" class="sub-container">
        <div class="sub-box highlight">Start a New Chat</div>
        <div class="sub-box">Chat with a Friend</div>
        <div class="sub-box">Live Recording</div>
    </div>

    <div class="feature-box review">
        <h2>Review</h2>
    </div>

</div>

<script>
    function toggleMenu() {
        const menu = document.getElementById('sub-menu');
        menu.classList.toggle('show');
    }
</script>

</body>
</html>
